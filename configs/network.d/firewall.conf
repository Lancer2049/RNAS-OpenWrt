# Firewall Configuration (nftables)

[zone "nas"]
name = nas
input = ACCEPT
output = ACCEPT
forward = REJECT
networks = lan

[rule "allow_ppp_pool"]
src = nas
dest = wan
target = ACCEPT

[rule "allow_coa"]
# Allow RADIUS CoA/Disconnect from management subnet
src = nas
proto = udp
dest_port = 3799
target = ACCEPT

[rule "allow_radius"]
# Allow RADIUS auth/acct to server
src = nas
proto = udp
dest_port = 1812,1813
target = ACCEPT
