# RADIUS Authentication, Accounting, and CoA Configuration

[server "primary"]
# RADIUS server endpoint (typically FreeRADIUS + AIRadius)
auth_host = 192.168.0.85
auth_port = 1812
acct_host = 192.168.0.85
acct_port = 1813
secret = ${RNAS_RADIUS_SECRET:-testing123}
timeout = 30
retries = 3
req_limit = 50
fail_timeout = 0
max_fail = 10
weight = 1

[nas]
identifier = rnas
ip_address = 192.168.0.84
gw_ip_address = 192.168.100.1

[accounting]
interim_interval = 300
interim_jitter = 100
acct_on = yes
acct_timeout = 120
message_authenticator = yes

[dae]
# Dynamic Authorization Extension (CoA/Disconnect)
enabled = yes
listen = 192.168.0.84:3799
secret = ${RNAS_RADIUS_SECRET:-testing123}
allowed_clients = 192.168.0.85
