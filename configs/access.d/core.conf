# accel-ppp Core Settings

[core]
thread_count = 4
log_file = /var/log/accel-ppp/accel-ppp.log
log_level = 3
daemon = yes

[modules]
# Protocol modules (enabled when interface is configured)
pppoe = yes
ipoe = no
l2tp = no
pptp = no
sstp = no
# Auth modules
auth_pap = yes
auth_chap_md5 = yes
auth_mschap_v1 = yes
auth_mschap_v2 = yes
# Infrastructure modules
radius = yes
ippool = yes
pppd_compat = yes
connlimit = yes
log_file = yes

[common]
sid_source = seq
check_ip = yes
max_sessions = 1000

[cli]
tcp = 127.0.0.1:2001
verbose = 1
